.quote{background:linear-gradient(135deg,#2A1244,#5B2178);color:#F3E3FA}

.danger{background:linear-gradient(135deg,#3D0A18,#8C1030);color:#FBD9E1}
.danger h2{color:#fff}.danger strong{color:#FFD9E3}
.step{position:relative;padding-top:30px}
